<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb</title>
</head>

<body>

    <div class="content">


        <div class="section">
            <h2>Pandis kaufen</h2>
            <p>Kaufe einen flauschigen Pandi🐼!</p>
            <button onclick="kaufPanda()">In den Warenkorb</button>
            <button onclick="leeren()" style="background:#888; color:white;">Leeren</button>
            <p>Im Warenkorb: <span id="warenkorb-zahl" style="font-weight:bold; color:#fdd835;">0</span> Pandas</p>
        </div>
    </div>

    <script>

         // --- FUNKTION: WARENKORB (localStorage) ---
        let korb = localStorage.getItem('pandaWarenkorb') || 0;
        document.querySelector('#warenkorb-zahl').innerText = korb;

        function kaufPanda() {
            korb++;
            document.querySelector('#warenkorb-zahl').innerText = korb;
            localStorage.setItem('pandaWarenkorb', korb); // localStorage wie gefordert
        }

        function leeren() {
            korb = 0;
            document.querySelector('#warenkorb-zahl').innerText = korb;
            localStorage.removeItem('pandaWarenkorb');
        }


         window.onload = function () {
            fliegendeEmojis();
            zeitCheck();
        };

    </script>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #1e2128;
            color: rgb(255, 255, 255);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Verhindert horizontales Scrollen wegen der Pandas */
        }

        .content {
            flex: 1;
            border-left: 1px solid #333;
            padding-left: 30px;
            background: rgba(30, 33, 40, 0.7);
            /* Leicht transparent */
            border-radius: 10px;
        }


        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #444;
            border-radius: 8px;
        }

        button {
            background-color: #b6acff;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px 5px 5px 0;
        }

        button:hover {
            background-color: #f7a1e7;
        }

        .content {
            flex: 1;
            border-left: 1px solid #333;
            padding-left: 30px;
            background: rgba(30, 33, 40, 0.7);
            /* Leicht transparent */
            border-radius: 10px;
        }
    </style>
</body>


</html>
